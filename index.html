document.getElementById("monster").onchange = function() {
  const name = this.value;
  document.getElementById("result").textContent =
    name ? "弱点：" + data[name] : "";
};

const search = document.getElementById("search");
const select = document.getElementById("monster");

// ひらがな → カタカナ変換
function hiraToKata(str) {
  return str.replace(/[\u3041-\u3096]/g, function(match) {
    return String.fromCharCode(match.charCodeAt(0) + 0x60);
  });
}

search.oninput = function() {
  // 入力文字を変換
  const keyword = hiraToKata(search.value).toLowerCase();

  for (let i = 0; i < select.options.length; i++) {
    const option = select.options[i];

    // optionの文字も変換
    const text = hiraToKata(option.text).toLowerCase();

    if (text.includes(keyword) || keyword === "") {
      option.style.display = "";
    } else {
      option.style.display = "none";
    }
  }
};
